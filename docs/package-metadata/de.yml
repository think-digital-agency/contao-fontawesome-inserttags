de:
    title: Contao FontAwesome Insert Tags
    description: >
        FontAwesome-Icons per Insert Tag überall in Contao 5 einsetzen – in Texten, Überschriften, Navigationen, HTML-Modulen, RSCE-Templates und überall sonst, wo Contao Insert Tags verarbeitet.

        Einfach {{fas::rocket}}, {{far::circle-check}} oder {{fab::github}} in beliebige Felder tippen – fertig. Optionale Modifier-Parameter ermöglichen Animationen und Größenangaben direkt im Tag: {{fas::spinner::spin::2x}}. Alle vier FontAwesome-Stile werden unterstützt: Solid, Regular, Brands und der generische fa-Tag für v4-Kompatibilität. Eingaben werden per Regex validiert – keine XSS-Angriffsfläche.
    keywords:
        - fontawesome
        - font awesome
        - icons
        - insert tag
        - svg icons
    support:
        issues: https://github.com/think-digital-agency/contao-fontawesome-inserttags/issues
        docs: https://github.com/think-digital-agency/contao-fontawesome-inserttags#readme
